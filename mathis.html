<!DOCTYPE HTML>
<html>
<head>
	<title>Mathis - Valyra</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html, body {
			height: 100%;
			width: 100%;
			background: #0b1220;
			overflow: hidden;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
		}

		#wrapper, #main, #main .inner {
			height: 100%;
			width: 100%;
		}

		#main .inner {
			display: flex;
			flex-direction: column;
		}

		/* =========================
		   HEADER MODERNO Y UNIFICADO
		========================= */
		.app-header {
			height: 70px;
			background: rgba(17, 24, 39, 0.95);
			backdrop-filter: blur(10px);
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 24px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
		}

		.header-left {
			display: flex;
			align-items: center;
			flex: 1;
		}

		/* Botón Volver - Estilo base */
		.back-btn {
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			text-decoration: none !important;
			color: #e0e7ff !important;
			font-size: 14px !important;
			font-weight: 500 !important;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif !important;
			text-transform: none !important;
			letter-spacing: normal !important;
			padding: 8px 20px !important;
			border-radius: 10px !important;
			background: rgba(255, 255, 255, 0.05) !important;
			border: 1px solid rgba(255, 255, 255, 0.1) !important;
			transition: all 0.25s ease !important;
			cursor: pointer !important;
		}

		.back-btn:hover {
			background: rgba(255, 255, 255, 0.12) !important;
			border-color: rgba(255, 255, 255, 0.2) !important;
			color: #ffffff !important;
			transform: translateY(-1px) !important;
		}

		.back-btn:active {
			transform: translateY(0) !important;
		}

		/* Título centrado - Una línea más grande */
		.app-title {
			text-align: center;
			flex: 2;
		}

		.app-title h2 {
			font-size: 22px;
			font-weight: 700;
			background: linear-gradient(135deg, #ffffff 0%, #93c5fd 100%);
			background-clip: text;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			letter-spacing: -0.3px;
			white-space: nowrap;
			margin: 0;
		}

		.header-right {
			display: flex;
			align-items: center;
			justify-content: flex-end;
			flex: 1;
		}

		/* Botón Salir - EXACTAMENTE el MISMO estilo que Volver */
		.logout-btn {
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			background: rgba(255, 255, 255, 0.05) !important;
			color: #e0e7ff !important;
			border: 1px solid rgba(255, 255, 255, 0.1) !important;
			padding: 8px 20px !important;
			border-radius: 10px !important;
			font-size: 14px !important;
			font-weight: 500 !important;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif !important;
			text-transform: none !important;
			letter-spacing: normal !important;
			cursor: pointer !important;
			transition: all 0.25s ease !important;
			text-decoration: none !important;
		}

		.logout-btn:hover {
			background: rgba(255, 255, 255, 0.12) !important;
			border-color: rgba(255, 255, 255, 0.2) !important;
			color: #ffffff !important;
			transform: translateY(-1px) !important;
		}

		.logout-btn:active {
			transform: translateY(0) !important;
		}

		/* =========================
		   CHAT FULL SCREEN
		========================= */
		.chat-container {
			flex: 1;
			position: relative;
			background: #0b1220;
		}

		.chat-container iframe {
			width: 100%;
			height: 100%;
			border: none;
			position: absolute;
			top: 0;
			left: 0;
		}

		/* Animación de carga suave para el iframe */
		.chat-container iframe {
			animation: fadeIn 0.4s ease-out;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		/* Mobile responsive */
		@media (max-width: 768px) {
			.app-header {
				height: 60px;
				padding: 0 16px;
			}

			.back-btn, .logout-btn {
				padding: 6px 16px !important;
				font-size: 12px !important;
			}

			.app-title h2 {
				font-size: 16px;
			}
		}

		/* Para pantallas muy pequeñas */
		@media (max-width: 480px) {
			.app-title h2 {
				font-size: 14px;
			}
			
			.back-btn, .logout-btn {
				padding: 5px 12px !important;
				font-size: 11px !important;
			}
		}
	</style>
</head>

<body class="is-preload">

	<div id="wrapper">
		<div id="main">
			<div class="inner">

				<!-- HEADER MEJORADO -->
				<div class="app-header">

					<div class="header-left">
						<a href="index.html" class="back-btn">Volver</a>
					</div>

					<div class="app-title">
						<h2>Mathis - Tutor de Tesis</h2>
					</div>

					<div class="header-right">
						<button id="logoutBtn" class="logout-btn">Salir</button>
					</div>

				</div>

				<!-- CHAT -->
				<div class="chat-container">
					<iframe
						src="https://www.chatbase.co/chatbot-iframe/fHBitF-MrYQ48IQOxGrxL"
						title="Mathis - Tutor de Tesis"
						allow="clipboard-write">
					</iframe>
				</div>

			</div>
		</div>
	</div>

	<!-- FIREBASE -->
	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
		import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

		const firebaseConfig = {
			apiKey: "AIzaSyAwtQL1VC-Lk9vnamjFc-g6GA9rvT6LvUo",
			authDomain: "valyra-mathis.firebaseapp.com",
			projectId: "valyra-mathis",
		};

		const app = initializeApp(firebaseConfig);
		const auth = getAuth(app);

		// PROTECCIÓN DE RUTA
		onAuthStateChanged(auth, (user) => {
			if (!user) {
				window.location.href = "login.html";
			}
		});

		// LOGOUT
		const logoutBtn = document.getElementById("logoutBtn");
		if (logoutBtn) {
			logoutBtn.addEventListener("click", () => {
				signOut(auth).then(() => {
					window.location.href = "login.html";
				}).catch((error) => {
					console.error("Error al cerrar sesión:", error);
				});
			});
		}
	</script>

</body>
</html>
