<!DOCTYPE HTML>
<html>
<head>
	<title>Mathis - Valyra</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html, body {
			height: 100%;
			width: 100%;
			background: #0b1220;
			overflow: hidden;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
		}

		#wrapper, #main, #main .inner {
			height: 100%;
			width: 100%;
		}

		#main .inner {
			display: flex;
			flex-direction: column;
		}

		/* =========================
		   HEADER MODERNO Y UNIFICADO
		========================= */
		.app-header {
			height: 64px;
			background: rgba(17, 24, 39, 0.95);
			backdrop-filter: blur(10px);
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 24px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
		}

		.header-left {
			display: flex;
			align-items: center;
			gap: 16px;
			flex: 1;
		}

		/* Botón Volver unificado */
		.back-btn {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			text-decoration: none;
			color: #e0e7ff;
			font-size: 14px;
			font-weight: 500;
			padding: 8px 16px;
			border-radius: 10px;
			background: rgba(255, 255, 255, 0.05);
			border: 1px solid rgba(255, 255, 255, 0.1);
			transition: all 0.25s ease;
			cursor: pointer;
		}

		.back-btn:hover {
			background: rgba(255, 255, 255, 0.12);
			border-color: rgba(255, 255, 255, 0.2);
			color: #ffffff;
			transform: translateY(-1px);
		}

		.back-btn:active {
			transform: translateY(0);
		}

		/* Título central con estilo premium */
		.app-title {
			text-align: center;
			flex: 2;
		}

		.app-title h2 {
			font-size: 20px;
			font-weight: 700;
			background: linear-gradient(135deg, #ffffff 0%, #93c5fd 100%);
			background-clip: text;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			margin-bottom: 4px;
			letter-spacing: -0.3px;
		}

		.app-title .subtitle {
			font-size: 12px;
			color: rgba(255, 255, 255, 0.6);
			font-weight: 500;
			letter-spacing: 0.3px;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 6px;
		}

		.app-title .subtitle::before,
		.app-title .subtitle::after {
			content: "•";
			color: #3b82f6;
			font-size: 10px;
		}

		.header-right {
			display: flex;
			align-items: center;
			justify-content: flex-end;
			flex: 1;
		}

		/* Botón Salir unificado (mismo estilo que Volver) */
		.logout-btn {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			background: rgba(239, 68, 68, 0.15);
			color: #fca5a5;
			border: 1px solid rgba(239, 68, 68, 0.3);
			padding: 8px 18px;
			border-radius: 10px;
			font-size: 14px;
			font-weight: 500;
			cursor: pointer;
			transition: all 0.25s ease;
			text-decoration: none;
		}

		.logout-btn:hover {
			background: rgba(239, 68, 68, 0.25);
			border-color: rgba(239, 68, 68, 0.5);
			color: #ffffff;
			transform: translateY(-1px);
		}

		.logout-btn:active {
			transform: translateY(0);
		}

		/* Iconos dentro de los botones */
		.btn-icon {
			font-size: 16px;
		}

		/* =========================
		   CHAT FULL SCREEN
		========================= */
		.chat-container {
			flex: 1;
			position: relative;
			background: #0b1220;
		}

		.chat-container iframe {
			width: 100%;
			height: 100%;
			border: none;
			position: absolute;
			top: 0;
			left: 0;
		}

		/* Animación de carga suave para el iframe */
		.chat-container iframe {
			animation: fadeIn 0.4s ease-out;
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		/* Mobile responsive */
		@media (max-width: 768px) {
			.app-header {
				height: 58px;
				padding: 0 16px;
			}

			.back-btn, .logout-btn {
				padding: 6px 12px;
				font-size: 12px;
			}

			.app-title h2 {
				font-size: 16px;
			}

			.app-title .subtitle {
				font-size: 10px;
			}

			.btn-icon {
				font-size: 14px;
			}
		}

		/* Para pantallas muy pequeñas */
		@media (max-width: 480px) {
			.header-left {
				flex: 1.5;
			}
			
			.back-btn span:not(.btn-icon) {
				display: none;
			}
			
			.back-btn .btn-icon {
				margin: 0;
			}
		}
	</style>
</head>

<body class="is-preload">

	<div id="wrapper">
		<div id="main">
			<div class="inner">

				<!-- HEADER MEJORADO -->
				<div class="app-header">

					<div class="header-left">
						<a href="index.html" class="back-btn">
							<span class="btn-icon">←</span>
							<span>Volver</span>
						</a>
					</div>

					<div class="app-title">
						<h2>Mathis</h2>
						<div class="subtitle">Tutor de Tesis IA</div>
					</div>

					<div class="header-right">
						<button id="logoutBtn" class="logout-btn">
							<span class="btn-icon">→</span>
							<span>Salir</span>
						</button>
					</div>

				</div>

				<!-- CHAT -->
				<div class="chat-container">
					<iframe
						src="https://www.chatbase.co/chatbot-iframe/fHBitF-MrYQ48IQOxGrxL"
						title="Mathis - Tutor de Tesis IA"
						allow="clipboard-write">
					</iframe>
				</div>

			</div>
		</div>
	</div>

	<!-- FIREBASE -->
	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
		import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

		const firebaseConfig = {
			apiKey: "AIzaSyAwtQL1VC-Lk9vnamjFc-g6GA9rvT6LvUo",
			authDomain: "valyra-mathis.firebaseapp.com",
			projectId: "valyra-mathis",
		};

		const app = initializeApp(firebaseConfig);
		const auth = getAuth(app);

		// PROTECCIÓN DE RUTA
		onAuthStateChanged(auth, (user) => {
			if (!user) {
				window.location.href = "login.html";
			}
		});

		// LOGOUT CON CONFIRMACIÓN OPCIONAL
		const logoutBtn = document.getElementById("logoutBtn");
		if (logoutBtn) {
			logoutBtn.addEventListener("click", () => {
				// Confirmación opcional (descomentar si quieres)
				// if (confirm("¿Estás seguro de que quieres salir?")) {
					signOut(auth).then(() => {
						window.location.href = "login.html";
					}).catch((error) => {
						console.error("Error al cerrar sesión:", error);
					});
				// }
			});
		}
	</script>

</body>
</html>
