<!DOCTYPE HTML>
<html>
<head>
	<title>Mathis - Valyra</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html, body {
			height: 100%;
			width: 100%;
			background: #0b1220;
			overflow: hidden;
			font-family: Arial, sans-serif;
		}

		#wrapper, #main, #main .inner {
			height: 100%;
			width: 100%;
		}

		#main .inner {
			display: flex;
			flex-direction: column;
		}

		/* =========================
		   HEADER MODERNO
		========================= */
		.app-header {
			height: 60px;
			background: #111827;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 18px;
			border-bottom: 1px solid rgba(255,255,255,0.08);
			box-shadow: 0 4px 18px rgba(0,0,0,0.35);
		}

		.header-left {
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.back-btn {
			text-decoration: none;
			color: #93c5fd;
			font-size: 13px;
			font-weight: 500;
			padding: 6px 10px;
			border-radius: 8px;
			transition: 0.2s;
		}

		.back-btn:hover {
			background: rgba(255,255,255,0.08);
			color: #ffffff;
		}

		.app-title {
			display: flex;
			flex-direction: column;
			line-height: 1.1;
		}

		.app-title h2 {
			font-size: 15px;
			color: #ffffff;
			font-weight: 600;
		}

		.app-title span {
			font-size: 11px;
			color: rgba(255,255,255,0.6);
		}

		.header-right {
			display: flex;
			align-items: center;
			gap: 10px;
		}

		.logout-btn {
			background: #ef4444;
			color: white;
			border: none;
			padding: 6px 10px;
			border-radius: 8px;
			font-size: 12px;
			cursor: pointer;
			transition: 0.2s;
		}

		.logout-btn:hover {
			background: #dc2626;
		}

		/* =========================
		   CHAT FULL SCREEN
		========================= */
		.chat-container {
			flex: 1;
			position: relative;
			background: #0b1220;
		}

		.chat-container iframe {
			width: 100%;
			height: 100%;
			border: none;
			position: absolute;
			top: 0;
			left: 0;
		}

		/* Mobile */
		@media (max-width: 768px) {
			.app-header {
				height: 52px;
				padding: 0 12px;
			}
		}
	</style>
</head>

<body class="is-preload">

	<div id="wrapper">
		<div id="main">
			<div class="inner">

				<!-- HEADER -->
				<div class="app-header">

					<div class="header-left">
						<a href="index.html" class="back-btn">← Volver</a>
					</div>

					<div class="app-title">
						<h2>Mathis</h2>
						<span>Tutor de tesis IA</span>
					</div>

					<div class="header-right">
						<button id="logoutBtn" class="logout-btn">Salir</button>
					</div>

				</div>

				<!-- CHAT -->
				<div class="chat-container">
					<iframe
						src="https://www.chatbase.co/chatbot-iframe/fHBitF-MrYQ48IQOxGrxL"
						title="Mathis"
						allow="clipboard-write">
					</iframe>
				</div>

			</div>
		</div>
	</div>

	<!-- FIREBASE -->
	<script type="module">
		import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
		import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

		const firebaseConfig = {
			apiKey: "AIzaSyAwtQL1VC-Lk9vnamjFc-g6GA9rvT6LvUo",
			authDomain: "valyra-mathis.firebaseapp.com",
			projectId: "valyra-mathis",
		};

		const app = initializeApp(firebaseConfig);
		const auth = getAuth(app);

		// PROTECCIÓN
		onAuthStateChanged(auth, (user) => {
			if (!user) {
				window.location.href = "login.html";
			}
		});

		// LOGOUT
		document.getElementById("logoutBtn").addEventListener("click", () => {
			signOut(auth).then(() => {
				window.location.href = "login.html";
			});
		});
	</script>

</body>
</html>
