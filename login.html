<!DOCTYPE html>
<html>
<head>
  <title>Login - Valyra</title>
  <meta charset="utf-8" />
</head>
<body style="font-family: Arial; text-align:center; margin-top:100px;">

<h2>Acceso a Mathis</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Entrar</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwtQL1VC-Lk9vnamjFc-g6GA9rvT6LvUo",
  authDomain: "valyra-mathis.firebaseapp.com",
  projectId: "valyra-mathis",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "mathis.html";
    })
    .catch(error => {
      alert("Error: " + error.message);
    });
}
</script>

</body>
</html>
