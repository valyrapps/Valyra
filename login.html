<!DOCTYPE html>
<html>
<head>
  <title>Valyra Access</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Fondo moderno */
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .card {
      width: 360px;
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #111827;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      outline: none;
      font-size: 14px;
    }

    input:focus {
      border-color: #4f8cff;
      box-shadow: 0 0 0 3px rgba(79,140,255,0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f8cff;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3b76e0;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="title">Valyra</div>
  <div class="subtitle">Acceso privado a Mathis AI</div>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Entrar</button>

  <div class="footer">Sistema seguro de acceso</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAwtQL1VC-Lk9vnamjFc-g6GA9rvT6LvUo",
  authDomain: "valyra-mathis.firebaseapp.com",
  projectId: "valyra-mathis",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// AUTO-REDIRECT SI YA ESTÁ LOGUEADO
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "mathis.html";
  }
});

//  LOGIN
window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Introduce email y contraseña");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "mathis.html";
  } catch (error) {
    console.error(error);
    alert("Credenciales incorrectas");
  }
}
</script>

</body>
</html>
